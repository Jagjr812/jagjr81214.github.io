<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Horizon Hotel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<a href="#rooms">Rooms</a>
<a href="#booking">Book</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>

<section id="rooms">
<h2>Our Rooms</h2>

<div class="room-container">

<div class="room">
<img src="https://images.unsplash.com/photo-1631049307264-8b8f2b0d8b88" alt="Deluxe Room">
<h3>Deluxe Room</h3>
<p>$120/night</p>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1590490360182-c33d57733427" alt="Suite">
<h3>Executive Suite</h3>
<p>$250/night</p>
</div>

<div class="room">
<img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85" alt="Standard Room">
<h3>Standard Room</h3>
<p>$80/night</p>
</div>

</div>
</section>

<section id="booking">
<h2>Book Your Stay</h2>

<form id="bookingForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="email" id="email" placeholder="Email Address" required>
<input type="date" id="checkin" required>
<input type="date" id="checkout" required>

<select id="roomType">
<option value="Deluxe Room">Deluxe Room</option>
<option value="Executive Suite">Executive Suite</option>
<option value="Standard Room">Standard Room</option>
</select>

<button type="submit">Reserve</button>
</form>

<div id="confirmation"></div>
</section>

<section id="gallery">
<h2>Gallery</h2>

<div class="gallery">
<img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb">
<img src="https://images.unsplash.com/photo-1520250497591-112f2f40a3f4">
<img src="https://images.unsplash.com/photo-1445019980597-93fa8acb246c">
</div>

</section>

<section id="contact">
<h2>Contact Us</h2>
<p>Email: contact@grandhorizon.com</p>
<p>Phone: +1 (555) 123-4567</p>
</section>

<footer>
<p>© 2026 Grand Horizon Hotel</p>
</footer>

<script src="script.js"></script>

</body>
</html>
